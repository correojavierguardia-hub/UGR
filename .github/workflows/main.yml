name: Crear Ejecutable Windows
on: [push, workflow_dispatch] # Permite ejecutarlo manualmente

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Nativefier
        run: npm install -g nativefier

      - name: Convertir HTML a EXE
        run: |
          nativefier "file:///${{ github.workspace }}/index.html" --name "UGR-Test" --internal-urls ".*" --single-instance --portable
          
      - name: Guardar el archivo EXE
        uses: actions/upload-artifact@v4
        with:
          name: Juego-Psicomotricidad-EXE
          path: ./*.zip # Nativefier portable suele crear un zip o carpeta
          if-no-files-found: warn
