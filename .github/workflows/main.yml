name: Ejecutable Final Corregido
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Descargar motor NW.js
        shell: pwsh
        run: |
          curl -L https://dl.nwjs.io/v0.82.0/nwjs-v0.82.0-win-x64.zip -o nwjs.zip
          Expand-Archive -Path nwjs.zip -DestinationPath temp
          # Movemos el contenido a una carpeta llamada 'output'
          Move-Item -Path temp/nwjs-v0.82.0-win-x64 -Destination output

      - name: Inyectar archivos del test
        shell: pwsh
        run: |
          # Copiamos tu HTML y el JSON a la carpeta del motor
          Copy-Item -Path "index.html" -Destination "output/"
          
          # Creamos el package.json directamente para evitar errores de archivo
          $json = '{"name":"ugr-test","main":"index.html","window":{"toolbar":false,"width":1000,"height":800}}'
          $json | Out-File -FilePath "output/package.json" -Encoding utf8
          
          # Renombramos el ejecutable para que sea facil de ver
          Rename-Item -Path "output/nw.exe" -NewName "UGR-Test-Psicomotricidad.exe"

      - name: Subir Juego
        uses: actions/upload-artifact@v4
        with:
          name: TEST-UGR-OPERATIVO
          path: output/   # <--- Ahora la ruta coincide exactamente con la carpeta creada
